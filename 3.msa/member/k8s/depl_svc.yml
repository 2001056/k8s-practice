apiVersion: apps/v1
kind: Deployment
metadata:
  name: member-depl
  namespace: chan-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: member
  template:
    metadata:
      labels:
        app: member
    spec:
      containers:
      - name: member
        image: 346903264902.dkr.ecr.ap-northeast-2.amazonaws.com/dlqudcks-ns/member:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1"
            memory: "500Mi"
          requests:
            cpu: "0.5"
            memory: "250Mi"
        # --- 여기부터 주의해서 보세요 ---
        env:
          - name: DB_HOST # env 안으로 들여쓰기 (공백 2칸 추가)
            valueFrom:
              secretKeyRef:
                name: ordersystem-secrets
                key: DB_HOST
          - name: DB_PW # env 안으로 들여쓰기 (공백 2칸 추가)
            valueFrom:
              secretKeyRef:
                name: ordersystem-secrets
                key: DB_PW
        readinessProbe: # containers 리스트의 하위 항목이므로 image, ports와 라인을 맞춰야 함
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: member-service
  namespace: chan-ns
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: member